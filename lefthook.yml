pre-commit:
  parallel: false
  commands:
    # 1. 依存関係の復元（後続の build/test が --no-restore / --no-build でも成立するようにする）
    dotnet-restore:
      run: dotnet restore CloudMigrator.slnx
    # 2. フォーマットチェック（CI の「フォーマットチェック」ステップ相当）
    dotnet-format:
      run: dotnet format CloudMigrator.slnx --verify-no-changes
    # 3. ビルド（CI の「ビルド」ステップ相当）
    dotnet-build:
      run: dotnet build CloudMigrator.slnx --no-restore --configuration Release
    # 4. ユニットテスト（CI の unit テスト相当。integration/E2E は時間がかかるため除外）
    dotnet-test-unit:
      run: dotnet test tests/unit/CloudMigrator.Tests.Unit.csproj --no-build --configuration Release
