coverage:
  status:
    patch:
      default:
        # Blazor Hybrid (WPF + Razor) UI code is excluded because UI testing is not feasible.
        target: auto
        threshold: 5%
        ignore_src:
          - "src/CloudMigrator.Dashboard/**"

ignore:
  - "src/CloudMigrator.Dashboard/App.xaml.cs"
  - "src/CloudMigrator.Dashboard/MainWindow.xaml.cs"
  - "src/CloudMigrator.Dashboard/WpfDialogService.cs"
  - "src/CloudMigrator.Dashboard/ILogChannel.cs"
  - "src/CloudMigrator.Dashboard/INativeDialogService.cs"
  - "src/CloudMigrator.Dashboard/Components/**"
