coverage:
  status:
    patch:
      default:
        # Blazor Hybrid (WPF + Razor) UI code is excluded because UI testing is not feasible.
        # CLI entry point and dashboard launcher launch external processes and are not unit-testable.
        # Dashboard/Runners directly instantiates external SDKs (Graph/Dropbox) as composition root,
        # making unit testing impractical without integration-level test infrastructure.
        target: auto
        threshold: 5%

ignore:
  - "src/CloudMigrator.Dashboard/Components/**"
  - "src/CloudMigrator.Dashboard/Runners/**"
  - "src/CloudMigrator.Dashboard/MainWindow.xaml.cs"
  - "src/CloudMigrator.Dashboard/App.xaml.cs"
  - "src/CloudMigrator.Dashboard/WpfDialogService.cs"
  - "src/CloudMigrator.Cli/Commands/DashboardCommand.cs"
  - "src/CloudMigrator.Cli/Program.cs"
