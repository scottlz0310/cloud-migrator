coverage:
  status:
    patch:
      default:
        # Blazor Hybrid (WPF + Razor) UI code is excluded because UI testing is not feasible.
        # DashboardCommand launches an external process and is not unit-testable.
        target: auto
        threshold: 5%

ignore:
  - "src/CloudMigrator.Dashboard/**"
  - "src/CloudMigrator.Cli/Commands/DashboardCommand.cs"
