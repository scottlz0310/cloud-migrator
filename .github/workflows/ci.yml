name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }} / .NET ${{ matrix.dotnet }})
    runs-on: ${{ matrix.os }}
    env:
      HUSKY: 0   # CI では git フックを実行しない
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        dotnet: ["10.0"]

    steps:
      - uses: actions/checkout@v6

      - name: .NET セットアップ
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: dotnet ツール復元
        run: dotnet tool restore

      - name: 依存関係の復元
        run: dotnet restore CloudMigrator.slnx

      - name: フォーマットチェック
        run: dotnet format CloudMigrator.slnx --verify-no-changes

      - name: ビルド
        run: dotnet build CloudMigrator.slnx --no-restore --configuration Release

      - name: テスト（unit + integration）
        run: |
          dotnet test tests/unit/CloudMigrator.Tests.Unit.csproj --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage" --results-directory TestResults
          dotnet test tests/integration/CloudMigrator.Tests.Integration.csproj --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: カバレッジレポートの解決
        id: coverage
        shell: pwsh
        run: |
          $coverage = Get-ChildItem -Path TestResults -Recurse -Filter coverage.cobertura.xml |
            Sort-Object FullName |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $coverage) {
            throw "coverage.cobertura.xml not found under TestResults"
          }
          "path=$coverage" >> $env:GITHUB_OUTPUT

      - name: Codecov へカバレッジ送信
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ steps.coverage.outputs.path }}
          flags: unit
          fail_ci_if_error: true
          verbose: true

      - name: テスト結果のアップロード
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.os }}-dotnet${{ matrix.dotnet }}
          path: |
            "**/TestResults/**/*.trx"
            "**/TestResults/**/coverage.cobertura.xml"

  quality-gate:
    name: Quality Gate
    runs-on: windows-latest
    needs: build-test
    if: github.event_name == 'pull_request'
    env:
      HUSKY: 0

    steps:
      - uses: actions/checkout@v6

      - name: .NET セットアップ
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0"

      - name: 依存関係の復元
        run: dotnet restore CloudMigrator.slnx

      - name: ビルド（品質チェック用）
        run: dotnet build CloudMigrator.slnx --no-restore --configuration Release

      - name: カバレッジ付きテスト実行
        run: dotnet test tests/unit/CloudMigrator.Tests.Unit.csproj --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory QualityResults --logger "trx;LogFileName=test-results.trx"

      - name: 品質ゲート用カバレッジレポートの解決
        id: quality-coverage
        shell: pwsh
        run: |
          $coverage = Get-ChildItem -Path QualityResults -Recurse -Filter coverage.cobertura.xml |
            Sort-Object FullName |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $coverage) {
            throw "coverage.cobertura.xml not found under QualityResults"
          }
          "path=$coverage" >> $env:GITHUB_OUTPUT

      - name: 品質メトリクスチェック
        run: dotnet run --project src/CloudMigrator.Cli/CloudMigrator.Cli.csproj --configuration Release -- quality-metrics --trx-dir QualityResults --coverage-xml "${{ steps.quality-coverage.outputs.path }}"

      - name: セキュリティスキャン
        run: dotnet run --project src/CloudMigrator.Cli/CloudMigrator.Cli.csproj --configuration Release -- security-scan

