name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }} / .NET ${{ matrix.dotnet }})
    runs-on: ${{ matrix.os }}
    env:
      LEFTHOOK: 0   # CI では git フックを実行しない
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        dotnet: ["10.0"]

    steps:
      - uses: actions/checkout@v6

      - name: .NET セットアップ
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: 依存関係の復元
        run: dotnet restore CloudMigrator.slnx

      - name: フォーマットチェック
        run: dotnet format CloudMigrator.slnx --verify-no-changes

      - name: ビルド
        run: dotnet build CloudMigrator.slnx --no-restore --configuration Release

      - name: テスト（unit + integration）
        run: |
          dotnet test tests/unit/CloudMigrator.Tests.Unit.csproj --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage" --results-directory TestResults
          dotnet test tests/integration/CloudMigrator.Tests.Integration.csproj --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: カバレッジレポートの解決
        id: coverage
        shell: pwsh
        run: |
          $coverage = Get-ChildItem -Path TestResults -Recurse -Filter coverage.cobertura.xml |
            Sort-Object FullName |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $coverage) {
            throw "coverage.cobertura.xml not found under TestResults"
          }
          "path=$coverage" >> $env:GITHUB_OUTPUT

      - name: Codecov へカバレッジ送信
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ steps.coverage.outputs.path }}
          flags: unit
          fail_ci_if_error: true
          verbose: true

      - name: テスト結果のアップロード
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.os }}-dotnet${{ matrix.dotnet }}
          path: |
            "**/TestResults/**/*.trx"
            "**/TestResults/**/coverage.cobertura.xml"

  quality-gate:
    name: Quality Gate
    runs-on: windows-latest
    needs: build-test
    if: github.event_name == 'pull_request'
    env:
      LEFTHOOK: 0

    steps:
      - uses: actions/checkout@v6

      - name: .NET セットアップ
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0"

      - name: 依存関係の復元
        run: dotnet restore CloudMigrator.slnx

      - name: ビルド（品質チェック用）
        run: dotnet build CloudMigrator.slnx --no-restore --configuration Release

      - name: カバレッジ付きテスト実行
        run: dotnet test tests/unit/CloudMigrator.Tests.Unit.csproj --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory QualityResults --logger "trx;LogFileName=test-results.trx"

      - name: 品質ゲート用カバレッジレポートの解決
        id: quality-coverage
        shell: pwsh
        run: |
          $coverage = Get-ChildItem -Path QualityResults -Recurse -Filter coverage.cobertura.xml |
            Sort-Object FullName |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $coverage) {
            throw "coverage.cobertura.xml not found under QualityResults"
          }
          "path=$coverage" >> $env:GITHUB_OUTPUT

      - name: 品質メトリクスチェック
        run: dotnet run --project src/CloudMigrator.Cli/CloudMigrator.Cli.csproj --configuration Release -- quality-metrics --trx-dir QualityResults --coverage-xml "${{ steps.quality-coverage.outputs.path }}"

      - name: セキュリティスキャン
        run: dotnet run --project src/CloudMigrator.Cli/CloudMigrator.Cli.csproj --configuration Release -- security-scan

  publish-win:
    name: win-x64 パブリッシュ（MSI ビルド用）
    runs-on: windows-latest
    needs: build-test
    if: github.event_name == 'pull_request'
    env:
      LEFTHOOK: 0

    steps:
      - uses: actions/checkout@v6

      - name: .NET SDK セットアップ
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0"

      - name: CLI / Dashboard を win-x64 向けにパブリッシュ（MSI ビルド検証用）
        shell: pwsh
        run: |
          dotnet publish src/CloudMigrator.Cli/CloudMigrator.Cli.csproj `
            --configuration Release --runtime win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:Version=0.0.0-ci --output publish/win-x64
          dotnet publish src/CloudMigrator.Dashboard/CloudMigrator.Dashboard.csproj `
            --configuration Release --runtime win-x64 --self-contained false `
            -p:Version=0.0.0-ci --output "publish/win-x64"

      - name: バイナリをアーティファクトに保存（MSI ビルド検証用）
        uses: actions/upload-artifact@v7
        with:
          name: ci-publish-win-x64
          path: publish/win-x64/
          retention-days: 1

  msi-check:
    name: MSI ビルド検証（WiX 回帰防止）
    runs-on: windows-latest
    needs: publish-win
    if: github.event_name == 'pull_request'
    env:
      LEFTHOOK: 0

    steps:
      - uses: actions/checkout@v6

      - name: .NET SDK セットアップ
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0"

      - name: WiX Toolset v5 インストール
        run: dotnet tool install wix --version 5.0.2 --global

      - name: WiX 拡張インストール（UI / Util）
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          wix extension add -g WixToolset.UI.wixext/5.0.2
          wix extension add -g WixToolset.Util.wixext/5.0.2

      - name: バイナリをダウンロード
        uses: actions/download-artifact@v8
        with:
          name: ci-publish-win-x64
          path: published/win-x64

      - name: MSI ビルド（WiX スキーマ・変数定義の検証）
        shell: pwsh
        run: |
          # WiX 5.0.2 は Files/Exclude 未サポートのため DepsDir を使用
          $binDir  = "${{ github.workspace }}/published/win-x64"
          $depsDir = "${{ github.workspace }}/published/win-x64-deps"
          Copy-Item -Path $binDir -Destination $depsDir -Recurse -Force
          Get-ChildItem $depsDir -Recurse -Filter "*.exe" | Remove-Item -Force
          Get-ChildItem $depsDir -Recurse -Filter "*.pdb" | Remove-Item -Force

          wix build installer/wix/Product.wxs `
            -arch x64 `
            -ext WixToolset.UI.wixext `
            -ext WixToolset.Util.wixext `
            -d Version=0.0.0 `
            -d "BinDir=$binDir" `
            -d "DepsDir=$depsDir" `
            -o cloud-migrator-ci.msi

      - name: MSI をアーティファクトに保存
        uses: actions/upload-artifact@v7
        with:
          name: msi-ci
          path: cloud-migrator-ci.msi
          retention-days: 7
