name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    name: Publish (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    env:
      LEFTHOOK: 0
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            archive_ext: zip
          - rid: linux-x64
            os: ubuntu-latest
            archive_ext: tar.gz
          - rid: osx-x64
            os: macos-latest
            archive_ext: tar.gz
          - rid: osx-arm64
            os: macos-latest
            archive_ext: tar.gz

    steps:
      - uses: actions/checkout@v6

      - name: .NET セットアップ
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: バージョン文字列を抽出（v プレフィックス除去）
        id: version
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          echo "version=${version#v}" >> "$GITHUB_OUTPUT"

      - name: 依存関係の復元（RID 付き）
        # self-contained publish に必要な runtime pack を正しく復元するため
        # --runtime と SelfContained プロパティを restore 側にも指定する
        run: >
          dotnet restore src/CloudMigrator.Cli/CloudMigrator.Cli.csproj
          --runtime ${{ matrix.rid }}
          -p:SelfContained=true
          -p:PublishSingleFile=true

      - name: Self-contained 単一ファイルとして発行
        run: >
          dotnet publish src/CloudMigrator.Cli/CloudMigrator.Cli.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:Version=${{ steps.version.outputs.version }}
          --no-restore
          --output publish/${{ matrix.rid }}

      - name: Dashboard を発行（win-x64 専用）
        if: matrix.rid == 'win-x64'
        run: >
          dotnet publish src/CloudMigrator.Dashboard/CloudMigrator.Dashboard.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          -p:Version=${{ steps.version.outputs.version }}
          --output publish/${{ matrix.rid }}

      - name: アーカイブ作成（Windows）
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $version  = "${{ github.ref_name }}"
          $assetName = "cloud-migrator-${version}-${{ matrix.rid }}.zip"
          Compress-Archive -Path "publish/${{ matrix.rid }}/*" -DestinationPath $assetName
          "ASSET_NAME=$assetName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: アーカイブ作成（Unix）
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          asset_name="cloud-migrator-${version}-${{ matrix.rid }}.tar.gz"
          tar -czf "${asset_name}" -C "publish/${{ matrix.rid }}" .
          echo "ASSET_NAME=${asset_name}" >> "$GITHUB_ENV"

      - name: リリースが存在しない場合は作成（競合耐性あり）
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_EXISTS=false
          if gh release view "${{ github.ref_name }}" > /dev/null 2>&1; then
            echo "Release '${{ github.ref_name }}' は既に存在します。"
            RELEASE_EXISTS=true
          fi

          if [ "$RELEASE_EXISTS" = "false" ]; then
            if gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --generate-notes; then
              echo "Release '${{ github.ref_name }}' を作成しました。"
            elif gh release view "${{ github.ref_name }}" > /dev/null 2>&1; then
              echo "別の並列ジョブが Release '${{ github.ref_name }}' を作成済みのため成功扱いにします。"
            else
              echo "Release '${{ github.ref_name }}' の作成に失敗しました。"
              exit 1
            fi
          fi

          # Draft 状態のまま残らないよう、常に公開・Latest に設定する（既存リリースも対象）
          gh release edit "${{ github.ref_name }}" --draft=false --latest
          echo "Release '${{ github.ref_name }}' を公開済み・Latest に設定しました。"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: リリースアセットをアップロード
        run: gh release upload ${{ github.ref_name }} "${{ env.ASSET_NAME }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Published バイナリをアーティファクトに保存（MSI ビルド用 / win-x64 のみ）
        if: matrix.rid == 'win-x64'
        uses: actions/upload-artifact@v7
        with:
          name: publish-win-x64
          path: publish/win-x64/
          retention-days: 1

  msi:
    name: MSI インストーラービルド
    runs-on: windows-latest
    needs: publish
    env:
      LEFTHOOK: 0

    steps:
      - uses: actions/checkout@v6

      - name: .NET セットアップ
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: WiX Toolset v5 インストール
        run: dotnet tool install wix --version 5.0.2 --global

      - name: win-x64 バイナリをダウンロード
        uses: actions/download-artifact@v8
        with:
          name: publish-win-x64
          path: published/win-x64

      - name: MSI 用バージョン文字列を抽出
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"

          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+(?:\.\d+)?)(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$') {
            throw "無効なリリースタグ形式です。SemVer 形式のタグ（例: v1.2.3, v1.2.3.4, v1.2.3-rc.1, v1.2.3+build.1）を使用してください: $tag"
          }

          $version = $Matches['version']
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: MSI ビルド
        shell: pwsh
        run: |
          # WiX 5.0.2 は Files/Exclude 未サポートのため、BinDir から *.exe / *.pdb を
          # 除いた DepsDir を作成して DashboardComponents に渡す
          $binDir  = "${{ github.workspace }}/published/win-x64"
          $depsDir = "${{ github.workspace }}/published/win-x64-deps"
          Copy-Item -Path $binDir -Destination $depsDir -Recurse -Force
          Get-ChildItem $depsDir -Recurse -Filter "*.exe" | Remove-Item -Force
          Get-ChildItem $depsDir -Recurse -Filter "*.pdb" | Remove-Item -Force

          wix build installer/wix/Product.wxs `
            -arch x64 `
            -d Version=${{ steps.version.outputs.version }} `
            -d "BinDir=$binDir" `
            -d "DepsDir=$depsDir" `
            -o cloud-migrator-setup.msi

      - name: MSI をリリースにアップロード
        run: gh release upload ${{ github.ref_name }} cloud-migrator-setup.msi --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
