name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    name: Publish (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    env:
      HUSKY: 0
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            archive_ext: zip
          - rid: linux-x64
            os: ubuntu-latest
            archive_ext: tar.gz
          - rid: osx-x64
            os: macos-latest
            archive_ext: tar.gz
          - rid: osx-arm64
            os: macos-latest
            archive_ext: tar.gz

    steps:
      - uses: actions/checkout@v6

      - name: .NET セットアップ
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0'

      - name: 依存関係の復元
        run: dotnet restore CloudMigrator.slnx

      - name: Self-contained 単一ファイルとして発行
        run: >
          dotnet publish src/CloudMigrator.Cli/CloudMigrator.Cli.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          --no-restore
          --output publish/${{ matrix.rid }}

      - name: アーカイブ作成（Windows）
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $version  = "${{ github.ref_name }}"
          $assetName = "cloud-migrator-${version}-${{ matrix.rid }}.zip"
          Compress-Archive -Path "publish/${{ matrix.rid }}/*" -DestinationPath $assetName
          "ASSET_NAME=$assetName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: アーカイブ作成（Unix）
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          asset_name="cloud-migrator-${version}-${{ matrix.rid }}.tar.gz"
          tar -czf "${asset_name}" -C "publish/${{ matrix.rid }}" .
          echo "ASSET_NAME=${asset_name}" >> "$GITHUB_ENV"

      - name: リリースアセットをアップロード
        run: gh release upload ${{ github.ref_name }} "${{ env.ASSET_NAME }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
